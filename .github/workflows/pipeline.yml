name: Tourism Package Prediction MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  register-dataset:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r Tourism_Package_prediction_Project/requirements.txt

      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Tourism_Package_prediction_Project/model_building/data_register.py


  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r Tourism_Package_prediction_Project/requirements.txt

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Tourism_Package_prediction_Project/model_building/prep.py


  model-training:
    needs: data-prep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r Tourism_Package_prediction_Project/requirements.txt

      - name: Start MLflow Tracking Server
        run: |
          nohup mlflow server \
          --backend-store-uri sqlite:///mlflow.db \
          --default-artifact-root ./artifacts \
          --host 0.0.0.0 \
          --port 5000 &
          sleep 10

      - name: Model Building and Experiment Tracking
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Tourism_Package_prediction_Project/model_building/train.py


  deploy-hosting:
    needs:
      - register-dataset
      - data-prep
      - model-training

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r Tourism_Package_prediction_Project/requirements.txt

      - name: Deploy Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Tourism_Package_prediction_Project/hosting/hosting.py
